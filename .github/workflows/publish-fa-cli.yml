name: Publish FA CLI plugin image
on:
  workflow_dispatch:
    inputs:
      base:
        description: "Base hassio-cli image to overlay"
        required: true
        default: "ghcr.io/esaueng/amd64-hassio-cli:2026.6.0"
      tag:
        description: "Tag to publish under ghcr.io/esaueng/amd64-hassio-cli"
        required: true
        default: "2026.6.0-fa.1"
permissions:
  contents: read
  packages: write
jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build the rebranded ha binary (amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o ha .
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}
      - name: Overlay onto the cli plugin image + push
        run: |
          set -euxo pipefail
          cat > Dockerfile.facli <<'EOF'
          # syntax=docker/dockerfile:1
          ARG BASE
          FROM ${BASE}
          COPY ha /usr/bin/ha
          RUN chmod +x /usr/bin/ha \
           && grep -aq 'Factory Assistant command line interface' /usr/bin/ha \
           && echo "FA banner compiled in: yes"
          EOF
          IMG=ghcr.io/esaueng/amd64-hassio-cli
          docker buildx build --platform linux/amd64 --build-arg BASE="${{ inputs.base }}" \
            -f Dockerfile.facli -t "$IMG:${{ inputs.tag }}" --push .
          echo "Published $IMG:${{ inputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
