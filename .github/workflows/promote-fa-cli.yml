name: Promote FA CLI tag
on:
  workflow_dispatch:
    inputs:
      from:
        required: true
        default: "2026.6.0-fa.1"
      to:
        required: true
        default: "2026.6.0"
permissions:
  contents: read
  packages: write
jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}
      - name: Re-tag (registry copy, no rebuild)
        run: |
          set -euxo pipefail
          IMG=ghcr.io/esaueng/amd64-hassio-cli
          docker buildx imagetools create -t "$IMG:${{ inputs.to }}" "$IMG:${{ inputs.from }}"
          echo "Promoted $IMG:${{ inputs.from }} -> $IMG:${{ inputs.to }}" >> "$GITHUB_STEP_SUMMARY"
